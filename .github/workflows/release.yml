name: Release On Main

on:
  push:
    branches:
      - main

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    name: Bump Version And Publish Release
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip release]')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
        
      - name: Bump Version in _meta.lua
        id: bump_version
        run: |
          META_FILE="_meta.lua"

          echo "Looking for _meta.lua at $META_FILE"
          if [ ! -f "$META_FILE" ]; then
            echo "Error: $META_FILE not found."
            exit 1
          fi

          CURRENT_VERSION_LINE=$(grep -m 1 '^\s*version\s*=\s*".*"' "$META_FILE")
          if [ -z "$CURRENT_VERSION_LINE" ]; then
            echo "Error: Version line not found in $META_FILE."
            echo "Ensure $META_FILE contains a line like: version = \"1.2.3\""
            exit 1
          fi

          CURRENT_VERSION=$(echo "$CURRENT_VERSION_LINE" | grep -oP '(?<=")[^"]+(?=")')
          if ! [[ "$CURRENT_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Version '$CURRENT_VERSION' in $META_FILE is not in X.Y.Z format."
            exit 1
          fi

          MAJOR=$(echo "$CURRENT_VERSION" | cut -d. -f1)
          MINOR=$(echo "$CURRENT_VERSION" | cut -d. -f2)
          PATCH=$(echo "$CURRENT_VERSION" | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          NEW_TAG="v$NEW_VERSION"

          echo "Current version: $CURRENT_VERSION -> New version: $NEW_VERSION"

          TEMP_META_FILE=$(mktemp)
          sed "s/^\(\s*version\s*=\s*\"\)$CURRENT_VERSION/\1$NEW_VERSION/" "$META_FILE" > "$TEMP_META_FILE" && mv "$TEMP_META_FILE" "$META_FILE"

          if ! grep -q "version\s*=\s*\"$NEW_VERSION\"" "$META_FILE"; then
              echo "Error: Failed to update version in $META_FILE."
              exit 1
          fi
          echo "Successfully updated $META_FILE to version $NEW_VERSION"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _meta.lua
          git commit -m "chore(release): ${{ steps.bump_version.outputs.tag }} [skip release]"
          git push origin HEAD:main
        shell: bash
        
      - name: Create ZIP Archive with Plugin Root Directory
        run: |
          PLUGIN_DIR="annas.koplugin"
          ZIP_NAME="annas.koplugin.zip"

          mkdir -p "$PLUGIN_DIR"

          cp _meta.lua "$PLUGIN_DIR/"
          cp main.lua "$PLUGIN_DIR/"
          cp messages.mo "$PLUGIN_DIR/"
          cp LICENSE "$PLUGIN_DIR/"
          cp README.md "$PLUGIN_DIR/"
          cp README.zh-CN.md "$PLUGIN_DIR/"
          cp -R annas "$PLUGIN_DIR/"
          cp -R src "$PLUGIN_DIR/"
          cp -R l10n "$PLUGIN_DIR/"

          zip -9 -r "$ZIP_NAME" "$PLUGIN_DIR/"
        shell: bash

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TARGET_SHA=$(git rev-parse HEAD)
          gh release create "${{ steps.bump_version.outputs.tag }}" \
            ./annas.koplugin.zip \
            --title "${{ steps.bump_version.outputs.tag }}" \
            --notes "Automated release for commit ${{ github.sha }}" \
            --target "$TARGET_SHA"
        shell: bash







